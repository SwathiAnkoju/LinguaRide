services:
  app:
    build: .

    ports:
      - "8080:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: linguaride
      DB_USER: username
      DB_PASSWORD: password

      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: linguaride
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

    ports:
      - "6379:6379"

volumes:
  postgres_data: